name: Release Check

on:
  push:
    branches: [main]
    tags: ['opencode-v*']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate port structure
        run: python3 tools/validate_port.py --root .

      - name: Validate plugin syntax
        run: node -c .opencode/plugins/ccgs-hooks.js

      - name: Run audit
        run: bash .opencode/audit.sh all --root .

      - name: Run hook fixture tests
        run: node .opencode/hooks/fixtures/test-fixtures.js

      - name: Release check (on tag)
        if: startsWith(github.ref, 'refs/tags/opencode-v')
        run: bash .opencode/audit.sh release --root .
